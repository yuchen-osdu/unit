# Default values for unit-deploy.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  domain: ""
  onPremEnabled: false
  limitsEnabled: true

data:
  logLevel: "ERROR"
  entitlementsHost: "http://entitlements"
  requestsCpu: "5m"
  requestsMemory: "275Mi"
  limitsCpu: "1"
  limitsMemory: "1G"
  serviceAccountName: "unit"
  imagePullPolicy: "IfNotPresent"
  image: ""

conf:
  appName: "unit"
  configmap: "unit-config"
  replicas: 1

istio:
  proxyCPU: "5m"
  proxyCPULimit: "500m"
  proxyMemory: "50Mi"
  proxyMemoryLimit: "512Mi"
  auth:
    basePath: /api/unit
    versions:
      - v2
      - v3
    disable:
      # context-root paths (leading / emitted as-is)
      - "/api/unit/index.html"
      - "/api/unit/api-docs"
      - "/api/unit/api-docs/*"
      - "/api/unit/api-docs.yaml"
      - "/api/unit/swagger"
      - "/api/unit/swagger-ui.html"
      - "/api/unit/swagger-ui/*"
      - "/api/unit/swagger-resources"
      - "/api/unit/swagger-config"
      - "/api/unit/_ah/liveness_check"
      - "/api/unit/_ah/readiness_check"
      # versioned paths (expanded to /api/unit/<version>/<path>)
      - "_ah/liveness_check"
      - "_ah/readiness_check"
