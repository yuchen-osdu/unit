components:
  schemas:
    UnitSystemEssenceImpl:
      type: object
      description: A unit system essence
      properties:
        ancestry:
          type: string
          description: The full ancestry of this unit system.
    UnitSystemRequest:
      type: object
      description: Request to get all unit assignments for the given unit system
      properties:
        essence:
          $ref: "#/components/schemas/UnitSystemEssenceImpl"
          description: A unit system essence
        persistableReference:
          type: string
          description: The unit system's persistable reference string
    ABCD:
      type: object
      properties:
        a:
          type: number
          format: double
        c:
          type: number
          format: double
        b:
          type: number
          format: double
        d:
          type: number
          format: double
    Measurement:
      type: object
      properties:
        name:
          type: string
        lastModified:
          type: string
        description:
          type: string
        unitQuantityCode:
          type: string
        essenceJson:
          type: string
        childMeasurementEssenceJsons:
          type: array
          items:
            type: string
        unitEssenceJsons:
          type: array
          items:
            type: string
        preferredUnitEssenceJsons:
          type: array
          items:
            type: string
        parentEssenceJson:
          type: string
        dimensionAnalysis:
          type: string
        code:
          type: string
        dimensionCode:
          type: string
        essence:
          $ref: "#/components/schemas/MeasurementEssence"
        baseMeasurement:
          type: boolean
        baseMeasurementEssenceJson:
          type: string
        deprecationInfo:
          $ref: "#/components/schemas/MeasurementDeprecationInfo"
        namespace:
          type: string
    MeasurementDeprecationInfo:
      type: object
      properties:
        state:
          type: string
        remarks:
          type: string
        supersededByUnitMeasurement:
          type: string
    MeasurementEssence:
      type: object
      properties:
        type:
          type: string
        ancestry:
          type: string
    ScaleOffset:
      type: object
      properties:
        offset:
          type: number
          format: double
        scale:
          type: number
          format: double
    Unit:
      type: object
      properties:
        name:
          type: string
        lastModified:
          type: string
        source:
          type: string
        description:
          type: string
        essenceJson:
          type: string
        displaySymbol:
          type: string
        essence:
          $ref: "#/components/schemas/UnitEssence"
        deprecationInfo:
          $ref: "#/components/schemas/UnitDeprecationInfo"
        namespace:
          type: string
    UnitAssignment:
      type: object
      properties:
        lastModified:
          type: string
        measurement:
          $ref: "#/components/schemas/Measurement"
        unit:
          $ref: "#/components/schemas/Unit"
    UnitDeprecationInfo:
      type: object
      properties:
        state:
          type: string
        supersededByUnit:
          type: string
        remarks:
          type: string
    UnitEssence:
      type: object
      properties:
        type:
          type: string
        symbol:
          type: string
        abcd:
          $ref: "#/components/schemas/ABCD"
        scaleOffset:
          $ref: "#/components/schemas/ScaleOffset"
        baseMeasurementEssence:
          $ref: "#/components/schemas/MeasurementEssence"
    UnitSystem:
      type: object
      properties:
        name:
          type: string
        offset:
          type: integer
          format: int32
        lastModified:
          type: string
        source:
          type: string
        description:
          type: string
        unitAssignmentCount:
          type: integer
          format: int32
        referenceUnitSystem:
          type: string
        unitAssignments:
          type: array
          items:
            $ref: "#/components/schemas/UnitAssignment"
        unitAssignmentCountInResponse:
          type: integer
          format: int32
        unitAssignmentCountTotal:
          type: integer
          format: int32
        ancestry:
          type: string
        persistableReference:
          type: string
    AppError:
      type: object
      description: Standard error response returned by OSDU services.
      properties:
        code:
          type: integer
          format: int32
          description: HTTP status code.
          example: 400
        reason:
          type: string
          description: Short error reason.
          example: Bad Request
        message:
          type: string
          description: Detailed error message.
          example: Invalid record format.
    ABCDImpl:
      type: object
      description: Energistics standard parameterization y = (A+Bx)/(C+Dx)
      properties:
        a:
          type: string
          format: double
          description: Coefficient A in the Energistics unit parameterization y =
            (A+Bx)/(C+Dx)
        b:
          type: string
          format: double
          description: Coefficient B in the Energistics unit parameterization y =
            (A+Bx)/(C+Dx)
        c:
          type: string
          format: double
          description: Coefficient C in the Energistics unit parameterization y =
            (A+Bx)/(C+Dx)
        d:
          type: string
          format: double
          description: Coefficient D in the Energistics unit parameterization y =
            (A+Bx)/(C+Dx)
    ScaleOffsetImpl:
      type: object
      description: Unit in y = scale*(x-offset) parameterization
      properties:
        scale:
          type: string
          format: double
          description: The offset in y = scale*(x-offset)
        offset:
          type: string
          format: double
          description: The scale in y = scale*(x-offset)
    UnitEssenceImpl:
      type: object
      description: The essence of a unit parameterization
      properties:
        abcd:
          $ref: "#/components/schemas/ABCDImpl"
          description: Energistics standard parameterization y = (A+Bx)/(C+Dx)
        scaleOffset:
          $ref: "#/components/schemas/ScaleOffsetImpl"
        symbol:
          type: string
          description: Unit in y = scale*(x-offset) parameterization
        baseMeasurement:
          $ref: "#/components/schemas/MeasurementEssence"
        type:
          type: string
          description: "The type string for this unit essence, either 'USO' for ScaleOffset\
            \ or 'UAD' for Abcd"
    UnitRequest:
      type: object
      description: Request to get a single unit instance given an essence.
      properties:
        persistableReference:
          type: string
          description: "The persistable reference string for the unit; optional, only\
            \ one 'persistableReference' or 'essence' must be defined"
        essence:
          $ref: "#/components/schemas/UnitEssenceImpl"
          description: The essence of a unit parameterization
    MeasurementEssenceImpl:
      type: object
      description: The essence of a measurement definition
      properties:
        baseMeasurementCode:
          type: string
          writeOnly: true
        ancestry:
          type: string
          description: "The measurement ancestry, i.e. the parent codes separated\
            \ by a period symbol."
        type:
          type: string
          description: The type string for this measurement
    MeasurementRequest:
      type: object
      description: Request to get a specific measurement given a persistable reference
        string or measurement essence structure.
      properties:
        essence:
          $ref: "#/components/schemas/MeasurementEssenceImpl"
          description: The essence of a measurement definition
        persistableReference:
          type: string
    SearchRequest:
      type: object
      description: Request to containing a Lucene style query string.
      properties:
        query:
          type: string
          description: The Lucene style query string with keywords
    MapState:
      type: object
      properties:
        state:
          type: string
        source:
          type: string
        description:
          type: string
    MeasurementMapItem:
      type: object
      properties:
        state:
          type: string
        toMeasurement:
          $ref: "#/components/schemas/Measurement"
        fromNamespace:
          type: string
        toNamespace:
          type: string
        fromMeasurement:
          $ref: "#/components/schemas/Measurement"
        note:
          type: string
    QueryResult:
      type: object
      properties:
        offset:
          type: integer
          format: int32
        count:
          type: integer
          format: int32
        units:
          type: array
          items:
            $ref: "#/components/schemas/Unit"
        measurements:
          type: array
          items:
            $ref: "#/components/schemas/Measurement"
        unitMapItems:
          type: array
          items:
            $ref: "#/components/schemas/UnitMapItem"
        measurementMapItems:
          type: array
          items:
            $ref: "#/components/schemas/MeasurementMapItem"
        mapStates:
          type: array
          items:
            $ref: "#/components/schemas/MapState"
        totalCount:
          type: integer
          format: int32
    UnitMapItem:
      type: object
      properties:
        state:
          type: string
        fromNamespace:
          type: string
        toNamespace:
          type: string
        fromUnit:
          $ref: "#/components/schemas/Unit"
        toUnit:
          $ref: "#/components/schemas/Unit"
        note:
          type: string
    ConversionScaleOffsetRequest:
      type: object
      description: A scale offset unit conversion request. The requested units are
        either passed as persistable reference strings (JSON serialized Unit 'essence')
        or as Unit essence structure.
      properties:
        fromUnit:
          $ref: "#/components/schemas/UnitEssenceImpl"
          description: The essence of a unit parameterization
        toUnit:
          $ref: "#/components/schemas/UnitEssenceImpl"
          description: The essence of a unit parameterization
        fromUnitPersistableReference:
          type: string
          description: The persistable reference string (JSON serialized Unit 'essence')
            representing toe 'from Unit'. Either 'fromUnitPersistableReference' or
            'fromUnit' must be populated.
        toUnitPersistableReference:
          type: string
          description: The persistable reference string (JSON serialized Unit 'essence')
            representing toe 'to Unit'. Either 'toUnitPersistableReference' or 'toUnit'
            must be populated.
    ConversionResult:
      type: object
      properties:
        abcd:
          $ref: "#/components/schemas/ABCD"
        scaleOffset:
          $ref: "#/components/schemas/ScaleOffset"
        fromUnit:
          $ref: "#/components/schemas/Unit"
        toUnit:
          $ref: "#/components/schemas/Unit"
    ConversionABCDRequest:
      type: object
      description: an Energistics Abcd style unit conversion request. The requested
        units are either passed as persistable reference strings (JSON serialized
        Unit 'essence') or as Unit essence structure
      properties:
        fromUnit:
          $ref: "#/components/schemas/UnitEssenceImpl"
          description: The essence of a unit parameterization
        toUnit:
          $ref: "#/components/schemas/UnitEssenceImpl"
        fromUnitPersistableReference:
          type: string
          description: The persistable reference string (JSON serialized Unit 'essence')
            representing toe 'from Unit'. Either 'fromUnitPersistableReference' or
            'fromUnit' must be populated.
        toUnitPersistableReference:
          type: string
          description: The persistable reference string (JSON serialized Unit 'essence')
            representing toe 'to Unit'. Either 'toUnitPersistableReference' or 'toUnit'
            must be populated.
    UnitSystemInfo:
      type: object
      description: A container for UnitSystem properties
      properties:
        name:
          type: string
          description: The unit system name
        description:
          type: string
          description: The unit system description
        ancestry:
          type: string
          description: "The unit system ancestry, i.e. names separated by '.'"
        persistableReference:
          type: string
          description: The unit system's persistable reference string.
    UnitSystemInfoResponse:
      type: object
      description: The unit system info structures
      properties:
        unitSystemInfoList:
          type: array
          description: The array of unit system names
          items:
            $ref: "#/components/schemas/UnitSystemInfo"
        totalCount:
          type: string
          description: The total number of elements in the list defined in the catalog
        offset:
          type: string
          description: The offset into the list as requested
        count:
          type: integer
          format: int32
    Catalog:
      type: object
      properties:
        units:
          type: array
          items:
            $ref: "#/components/schemas/Unit"
        lastModified:
          type: string
        unitSystemInfos:
          type: array
          items:
            $ref: "#/components/schemas/UnitSystemInfo"
        totalUnitCount:
          type: integer
          format: int32
        totalMeasurementCount:
          type: integer
          format: int32
        totalUnitSystemCount:
          type: integer
          format: int32
        totalUnitMapCount:
          type: integer
          format: int32
        totalMeasurementMapCount:
          type: integer
          format: int32
        totalMapStateCount:
          type: integer
          format: int32
        measurements:
          type: array
          items:
            $ref: "#/components/schemas/Measurement"
        unitMaps:
          type: array
          items:
            $ref: "#/components/schemas/UnitMap"
        measurementMaps:
          type: array
          items:
            $ref: "#/components/schemas/MeasurementMap"
        mapStates:
          type: array
          items:
            $ref: "#/components/schemas/MapState"
    MeasurementMap:
      type: object
      properties:
        measurementMapItems:
          type: array
          items:
            $ref: "#/components/schemas/MeasurementMapItem"
        fromNamespace:
          type: string
        toNamespace:
          type: string
        measurementMapItemCount:
          type: integer
          format: int32
    UnitMap:
      type: object
      properties:
        unitMapItems:
          type: array
          items:
            $ref: "#/components/schemas/UnitMapItem"
        fromNamespace:
          type: string
        toNamespace:
          type: string
        unitMapItemCount:
          type: integer
          format: int32
    CatalogLastModified:
      type: object
      properties:
        lastModified:
          type: string
  securitySchemes:
    Authorization:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: Authorization
